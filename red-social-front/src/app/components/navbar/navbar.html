<header class="navbar">
  <a routerLink="/publicaciones" class="brand">
    <div class="brand-mark">
      <span>RS</span>
    </div>

    <div class="brand-copy">
      <strong>Conecta</strong>
      <small>Red social</small>
    </div>
  </a>

  <nav class="nav-links">
    <a routerLink="/publicaciones" routerLinkActive="active">
      <span>Publicaciones</span>
    </a>

    @if (isLoggedIn()) {
      <a routerLink="/mi-perfil" routerLinkActive="active">
        <span>Mi perfil</span>
      </a>

      @if (isAdmin) {
        <a routerLink="/dashboard/usuarios" routerLinkActive="active">
          <span>Dashboard usuarios</span>
        </a>

        <a routerLink="/dashboard/estadisticas" routerLinkActive="active">
          <span>Estadísticas</span>
        </a>
      }

      <span class="nav-user">
        {{ currentUser()?.nombreUsuario }}
      </span>

      <button
        type="button"
        class="nav-logout"
        (click)="logout()"
      >
        Cerrar sesión
      </button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">
        <span>Login</span>
      </a>

      <a routerLink="/registro" routerLinkActive="active">
        <span>Registro</span>
      </a>
    }
  </nav>
</header>
